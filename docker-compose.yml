version: "3.8"

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15-alpine
    container_name: aho-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-aho_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aho_password}
      POSTGRES_DB: ${DB_NAME:-aho_bot}
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schemas/database_schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT_EXTERNAL:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aho_user} -d ${DB_NAME:-aho_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aho_network

  # Telegram бот
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aho-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Telegram
      BOT_TOKEN: ${BOT_TOKEN}
      AHO_GROUP_ID: ${AHO_GROUP_ID}
      PASS_TOPIC_ID: ${PASS_TOPIC_ID:-2}
      PURCHASE_TOPIC_ID: ${PURCHASE_TOPIC_ID:-4}
      REPAIR_TOPIC_ID: ${REPAIR_TOPIC_ID:-6}
      OTHER_TOPIC_ID: ${OTHER_TOPIC_ID:-10}
      
      # Администратор
      ADMIN_ID: ${ADMIN_ID}
      
      # База данных
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-aho_user}
      DB_PASSWORD: ${DB_PASSWORD:-aho_password}
      DB_NAME: ${DB_NAME:-aho_bot}
      DB_POOL_MIN: ${DB_POOL_MIN:-5}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      
      # Email (опционально)
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      
      # Rate limiting
      RATE_LIMIT_TICKETS: ${RATE_LIMIT_TICKETS:-5}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-3600}
      
      # Логирование
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - aho_network

volumes:
  postgres_data:
    driver: local

networks:
  aho_network:
    driver: bridge
